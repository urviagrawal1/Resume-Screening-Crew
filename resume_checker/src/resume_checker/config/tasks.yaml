report_task:
  description: >
    You are tasked with generating a comprehensive resume screening report based on the provided job description ({jd_text}) and a dictionary of resumes ({resume_text}). Please follow the steps below:

      1. Analyze and summarize the key requirements, skills, and qualifications from the job description.
      2. Evaluate *each candidate* in the resume dictionary by calculating a normalized score (0–100) based on multiple fit dimensions.
      3. Sort and rank all candidates from highest to lowest score.
      4. Construct a complete *Markdown report* that includes:

         ### 1. 📌 Job Overview
         - Summary of the position, required skills, and qualifications

         ### 2. 🏆 Candidate Ranking Table
         - A quick comparison of all candidates, sorted by score

         ### 3. 🧑‍💼 Individual Candidate Profiles
         - Detailed evaluations with:
           - Component-wise scores
           - Two key strengths
           - Two key improvement areas
           - Summary of overall fit

         ### 4. 🔍 Suggested Next Steps
         - Recommended actions (e.g., shortlist, consider for other roles, reject)

      5. 🔧 At the *end* of the markdown report, append a structured JSON block (enclosed in triple backticks) as shown below:

         json
         {
           "job_title": "(Job Title)",
           "candidates": [
             {
               "name": "(Candidate Name)",
               "score": (overall score as number),
               "fit_indicator": "🟢 or 🟡 or 🔴",
               "top_strength_1": "(First top strength)",
               "top_strength_2": "(Second top strength)",
               "primary_gap_1": "(First primary gap)",
               "primary_gap_2": "(Second primary gap)",
               "skill_match": (Skill Match score as number),
               "experience": (Experience score as number),
               "education": (Education score as number),
               "culture_fit": (Culture Fit score as number),
               "keywords": (Keywords score as number),
               "email": "(if present, else empty)",
               "fit_summary": "(Concise summary of candidate's suitability - 2 to 3 sentences)"
             }
           ]
         }

  expected_output: >
    A structured and well-formatted Markdown report that includes:
    - A concise overview of the job
    - A ranking table of all candidates
    - In-depth profiles with breakdown of individual scores, strengths, gaps, and fit summary
    - Actionable next step recommendations


  agent: recruiter_agent
  input: "{resume_text}"